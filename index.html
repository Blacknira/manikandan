<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fake Store - API </title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #f5f5f5; padding: 20px; }
    h1 { text-align: center; margin-bottom: 20px; }
    
    #products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      justify-items: center;
    }
    
    .card {
      width: 300px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: 0.3s;
    }
    
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    
    .card img {
      width: 100%;
      height: 250px;
      object-fit: contain;
      padding: 10px;
    }
    
    .card-body { padding: 15px; }
    .card-title { font-size: 16px; margin-bottom: 8px; height: 40px; overflow: hidden; }
    .card-price { font-size: 18px; font-weight: bold; color: #2196F3; margin-bottom: 8px; }
    .card-desc { font-size: 14px; color: #666; margin-bottom: 15px; height: 40px; overflow: hidden; }
    
    .btn {
      width: 100%;
      padding: 10px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn:hover { background: #1976D2; }
    
    #loading, #error { text-align: center; font-size: 20px; padding: 40px; grid-column: 1 / -1; }
    #error { color: red; }
  </style>
</head>
<body>
  <h1>Products</h1>
  <div id="products"></div>

  
  <script src="script.js"></script>
</body>
</html>
